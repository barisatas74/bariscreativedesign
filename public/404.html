<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex" />
    <title>404 — Sayfa bulunamadı | BarışCreativeDesign</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #050505;
        color: #ffffff;
        font-family: Inter, system-ui, sans-serif;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      .wrap { max-width: 640px; }
      h1 {
        font-family: "Archivo Black", Inter, sans-serif;
        font-size: clamp(5rem, 18vw, 11rem);
        margin: 0;
        line-height: 0.9;
        color: #d7ff36;
        text-shadow: 4px 4px 0 #050505;
      }
      h2 {
        font-family: "Archivo Black", Inter, sans-serif;
        font-size: clamp(1.5rem, 4vw, 2.4rem);
        margin: 1.5rem 0 0.75rem;
      }
      p { color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2rem;
        padding: 0.9rem 1.5rem;
        background: #d7ff36;
        color: #050505;
        font-weight: 900;
        text-decoration: none;
        border-radius: 999px;
        transition: background 0.2s;
      }
      a:hover { background: #ffffff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>404</h1>
      <h2>Aradığın sayfa kaybolmuş.</h2>
      <p>Yanlış bir bağlantı takip etmiş olabilirsin. Anasayfaya dönüp baştan başlayalım.</p>
      <a href="/">Anasayfaya dön →</a>
    </div>
  </body>
</html>
